version: 2.1

workflows:
  version: 2.1
  build_and_push:
    jobs:
      - build:
          filters:
            tags:
              only: /.*/
          context:
            - "Docker Hub"

jobs:
  build:
    machine:
      image: ubuntu-2404:current
    steps:
      - checkout

      - run:
          name: Run Docker login
          command: |
            echo $DOCKER_PASS | docker login -u $DOCKER_USER --password-stdin

      - run:
          name: Build and push image
          command: |
            IMAGE_NAME="${DOCKER_USER}/alpine-image-builder"
            if [ -n "${CIRCLE_TAG}" ]; then
              MAJOR="${CIRCLE_TAG%%.*}"
              MINOR="${CIRCLE_TAG%.*}"
              docker build \
                -t "${IMAGE_NAME}:${CIRCLE_TAG}" \
                -t "${IMAGE_NAME}:${MINOR}" \
                -t "${IMAGE_NAME}:${MAJOR}" \
                -t "${IMAGE_NAME}:latest" \
                -t "${IMAGE_NAME}:stable" \
                .
              docker push "${IMAGE_NAME}:${CIRCLE_TAG}"
              docker push "${IMAGE_NAME}:${MINOR}"
              docker push "${IMAGE_NAME}:${MAJOR}"
              docker push "${IMAGE_NAME}:latest"
              docker push "${IMAGE_NAME}:stable"
            else
              docker build -t "${IMAGE_NAME}:latest" .
              docker push "${IMAGE_NAME}:latest"
            fi

      - run:
          name: Tag and push git tag
          command: |
            if [ -n "${CIRCLE_TAG}" ]; then
              echo "Released ${CIRCLE_TAG}"
            fi
